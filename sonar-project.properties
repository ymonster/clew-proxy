# SonarCloud CI-based analysis config.
# NOTE: The project currently uses Automatic Analysis — exclusions in
# this file are ignored; they must be set in SonarCloud UI under
# Administration → General Settings → Analysis Scope. This file is
# kept for future migration to CI-based analysis (sonar-scanner in CI).

sonar.projectKey=ymonster_clew-proxy
sonar.organization=ymonster

# Only scan Clew's own source — skip vendored libraries and build artifacts.
sonar.sources=src,frontend/src,tests,assets,scripts

# Belt-and-suspenders: explicit excludes in case sources gets broadened later.
sonar.exclusions=WinDivert-2.2.2-A/**,src/ui/third_party/**,build/**,frontend/dist/**,frontend/node_modules/**,docs/images/**,**/*.min.js
